# -- GitHub org this installation watches (repo owner for single-user installs)
github:
  org: ""
  # -- Webhook HMAC secret. Leave empty to auto-generate once (persisted across upgrades).
  webhookSecret: ""
  # -- GitHub token for the discovery scanner (read-only). Empty disables discovery.
  token: ""

anthropic:
  # -- Admin API key (sk-ant-admin…) enabling the Analytics + cost-report pollers.
  adminKey: ""

slack:
  # -- Incoming-webhook URL for alert notifications.
  webhookUrl: ""

litellm:
  # -- LiteLLM gateway base URL + admin key: enables the gateway spend
  # poller (daily billed totals for deployments with no Anthropic invoice).
  baseUrl: ""
  adminKey: ""

# -- Days of raw webhook deliveries to keep (0 disables the sweep).
retentionDays: 30

ingest:
  # -- Ingest bearer token CI runners send. Leave empty to auto-generate once.
  token: ""
  replicas: 1
  service:
    # -- ClusterIP (default; put an Ingress in front) or LoadBalancer for a
    # direct public/internal address without an ingress controller.
    type: ClusterIP
    # -- CIDR allowlist for LoadBalancer traffic. For a production ingest:
    # GitHub's webhook ranges (api.github.com/meta → "hooks") plus your
    # runner egress CIDRs. Empty = open.
    loadBalancerSourceRanges: []
  image:
    repository: ghcr.io/scuttledeck/scuttledeck-ingest
    tag: ""            # defaults to chart appVersion
    pullPolicy: IfNotPresent
  resources: {}

web:
  # -- Dashboard login password. Leave empty to auto-generate once
  # (printed by helm install/upgrade NOTES, persisted across upgrades).
  password: ""
  # -- Dashboard session lifetime in hours.
  sessionTtlHours: 168
  replicas: 1
  service:
    type: ClusterIP
    loadBalancerSourceRanges: []
  image:
    repository: ghcr.io/scuttledeck/scuttledeck-web
    tag: ""            # defaults to chart appVersion
    pullPolicy: IfNotPresent
  resources: {}

postgres:
  # -- Run a bundled Postgres 16 StatefulSet. Disable to bring your own database.
  enabled: true
  # Fully qualified — some runtimes (e.g. CRI-O on Oracle Linux) enforce
  # short-name resolution and reject bare `postgres:16-alpine`.
  image: docker.io/library/postgres:16-alpine
  user: scuttledeck
  database: scuttledeck
  # -- Leave empty to auto-generate once (persisted across upgrades).
  password: ""
  storage: 5Gi
  storageClassName: ""
  resources: {}

# -- Full connection string for an external database (used when postgres.enabled=false)
externalDatabaseUrl: ""

ingress:
  enabled: false
  className: ""
  # -- Public host. GitHub webhooks + CI telemetry are routed to the ingest
  # service, everything else to the dashboard.
  host: scuttledeck.example.com
  annotations: {}
  tls: []
  # - secretName: scuttledeck-tls
  #   hosts: [scuttledeck.example.com]

imagePullSecrets: []
