{{- /*
Secrets are generated on first install and re-read from the live Secret on
upgrades (lookup), so `helm upgrade` never silently rotates credentials.
Explicit values always win.
*/ -}}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace (include "scuttledeck.secretName" .)) | default dict }}
{{- $data := $existing.data | default dict }}
{{- $webhookSecret := .Values.github.webhookSecret | default (get $data "GITHUB_WEBHOOK_SECRET" | b64dec) | default (randAlphaNum 40) }}
{{- $ingestToken := .Values.ingest.token | default (get $data "INGEST_TOKEN" | b64dec) | default (randAlphaNum 40) }}
{{- $pgPassword := .Values.postgres.password | default (get $data "POSTGRES_PASSWORD" | b64dec) | default (randAlphaNum 32) }}
{{- $databaseUrl := .Values.externalDatabaseUrl }}
{{- if .Values.postgres.enabled }}
{{- $databaseUrl = printf "postgres://%s:%s@%s:5432/%s" .Values.postgres.user $pgPassword (include "scuttledeck.postgresHost" .) .Values.postgres.database }}
{{- end }}
{{- if not $databaseUrl }}
{{- fail "set externalDatabaseUrl when postgres.enabled=false" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "scuttledeck.secretName" . }}
  labels:
    {{- include "scuttledeck.labels" . | nindent 4 }}
type: Opaque
data:
  GITHUB_WEBHOOK_SECRET: {{ $webhookSecret | b64enc }}
  INGEST_TOKEN: {{ $ingestToken | b64enc }}
  POSTGRES_PASSWORD: {{ $pgPassword | b64enc }}
  DATABASE_URL: {{ $databaseUrl | b64enc }}
