{{- $creds := include "scuttledeck.creds" . | fromJson }}
{{- $databaseUrl := .Values.externalDatabaseUrl }}
{{- if .Values.postgres.enabled }}
{{- $databaseUrl = printf "postgres://%s:%s@%s:5432/%s" .Values.postgres.user (get $creds "pgPassword") (include "scuttledeck.postgresHost" .) .Values.postgres.database }}
{{- end }}
{{- if not $databaseUrl }}
{{- fail "set externalDatabaseUrl when postgres.enabled=false" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "scuttledeck.secretName" . }}
  labels:
    {{- include "scuttledeck.labels" . | nindent 4 }}
type: Opaque
data:
  GITHUB_WEBHOOK_SECRET: {{ get $creds "webhookSecret" | b64enc }}
  INGEST_TOKEN: {{ get $creds "ingestToken" | b64enc }}
  POSTGRES_PASSWORD: {{ get $creds "pgPassword" | b64enc }}
  DASHBOARD_PASSWORD: {{ get $creds "dashboardPassword" | b64enc }}
  DATABASE_URL: {{ $databaseUrl | b64enc }}
