apiVersion: v1
kind: Service
metadata:
  name: {{ include "scuttledeck.fullname" . }}-web
  labels:
    {{- include "scuttledeck.labels" . | nindent 4 }}
spec:
  type: {{ .Values.web.service.type }}
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: web
  ports:
    - name: http
      port: 3000
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "scuttledeck.fullname" . }}-web
  labels:
    {{- include "scuttledeck.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "scuttledeck.labels" . | nindent 8 }}
        app.kubernetes.io/component: web
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ include "scuttledeck.webTag" . }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "scuttledeck.secretName" . }}
                  key: DATABASE_URL
            - name: DASHBOARD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "scuttledeck.secretName" . }}
                  key: DASHBOARD_PASSWORD
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.web.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
